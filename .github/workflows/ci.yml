name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @epicerie/shared-types build

      - name: Typecheck
        run: pnpm typecheck

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: epicerie
          POSTGRES_PASSWORD: epicerie_dev
          POSTGRES_DB: epicerie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @epicerie/shared-types build

      - name: Generate Prisma client
        run: pnpm --filter api db:generate
        env:
          DATABASE_URL: postgresql://epicerie:epicerie_dev@localhost:5432/epicerie_test

      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://epicerie:epicerie_dev@localhost:5432/epicerie_test

      - name: Run tests
        run: pnpm --filter api test:coverage
        env:
          DATABASE_URL: postgresql://epicerie:epicerie_dev@localhost:5432/epicerie_test
          NODE_ENV: test
